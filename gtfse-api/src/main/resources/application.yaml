spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false
  datasource:
    url: jdbc:postgresql://localhost:5432/gtfse
    username: postgres
    password: postgres
  application:
    name: gtfse-api
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/gtfs/protocol/openid-connect/certs
  docker:
    compose:
      enabled: true
      profiles:
        active: dev
      file: ./docker/docker-compose.yaml

