spring:
  cache:
    type: redis
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
      database: 0
      timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false
    properties:
      hibernate.jdbc.batch_size: 500
      hibernate.order_inserts: true
      hibernate.order_updates: true
  datasource:
    url: jdbc:postgresql://localhost:5432/gtfse
    username: postgres
    password: postgres
  application:
    name: gtfse-api
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/gtfs/protocol/openid-connect/certs
  docker:
    compose:
      enabled: true
      profiles:
        active: dev
      file: ./docker/docker-compose.yaml
gtfs:
  import:
    enabled: false
    zip-path: data/import/spnv.zip